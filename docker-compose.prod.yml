name: fkh

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18481}
    image: fkh-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-18480}:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fkh-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      PUBLIC_CDN_URL: ${PUBLIC_CDN_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_LOGIN_REQUEST_TTL_SECONDS: ${TELEGRAM_LOGIN_REQUEST_TTL_SECONDS:-300}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      ORDER_NOTIFICATIONS_ENABLED: ${ORDER_NOTIFICATIONS_ENABLED:-false}
      CRYPTO_BTC_ADDRESSES: ${CRYPTO_BTC_ADDRESSES:-}
      CRYPTO_USDT_ERC20_ADDRESSES: ${CRYPTO_USDT_ERC20_ADDRESSES:-}
      CRYPTO_USDT_TRC20_ADDRESSES: ${CRYPTO_USDT_TRC20_ADDRESSES:-}
      CRYPTO_USDC_ERC20_ADDRESSES: ${CRYPTO_USDC_ERC20_ADDRESSES:-}
      CRYPTO_PAYMENT_TTL_MINUTES: ${CRYPTO_PAYMENT_TTL_MINUTES:-120}
      CRYPTO_BTC_PAYMENT_TTL_MINUTES: ${CRYPTO_BTC_PAYMENT_TTL_MINUTES:-360}
      CRYPTO_ETH_TOKEN_PAYMENT_TTL_MINUTES: ${CRYPTO_ETH_TOKEN_PAYMENT_TTL_MINUTES:-90}
      CRYPTO_TRON_PAYMENT_TTL_MINUTES: ${CRYPTO_TRON_PAYMENT_TTL_MINUTES:-45}
      CRYPTO_POLL_INTERVAL_SECONDS: ${CRYPTO_POLL_INTERVAL_SECONDS:-60}
      CRYPTO_BTC_CONFIRMATIONS: ${CRYPTO_BTC_CONFIRMATIONS:-1}
      CRYPTO_ETH_CONFIRMATIONS: ${CRYPTO_ETH_CONFIRMATIONS:-12}
      CRYPTO_TRON_CONFIRMATIONS: ${CRYPTO_TRON_CONFIRMATIONS:-20}
      COINGECKO_API_URL: ${COINGECKO_API_URL:-https://api.coingecko.com/api/v3}
      MEMPOOL_API_URL: ${MEMPOOL_API_URL:-https://mempool.space/api}
      ETHERSCAN_API_URL: ${ETHERSCAN_API_URL:-https://api.etherscan.io/v2/api}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      TRONGRID_API_URL: ${TRONGRID_API_URL:-https://api.trongrid.io}
      TRONGRID_API_KEY: ${TRONGRID_API_KEY:-}
      AGE_GATE_ENABLED: ${AGE_GATE_ENABLED:-false}
      REGION_RESTRICTIONS_ENABLED: ${REGION_RESTRICTIONS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-18481}:4000"
    volumes:
      - fkh_uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fkh}
      POSTGRES_USER: ${POSTGRES_USER:-fkh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - fkh_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fkh} -d ${POSTGRES_DB:-fkh}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - fkh_redis_data:/data

volumes:
  fkh_postgres_data:
  fkh_redis_data:
  fkh_uploads:
