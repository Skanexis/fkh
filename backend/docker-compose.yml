services:
  postgres:
    image: postgres:16-alpine
    container_name: fkh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fkh
      POSTGRES_USER: fkh
      POSTGRES_PASSWORD: fkh_password
    ports:
      - "5432:5432"
    volumes:
      - fkh_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fkh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  fkh_postgres_data:
